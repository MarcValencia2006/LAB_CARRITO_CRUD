{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card p-3 shadow-sm">
            <h4>Nuevo Producto</h4>
            <form action="/carrito" method="POST">
                <input type="text" name="producto" class="form-control mb-2" placeholder="Producto" required>
                <input type="number" step="0.01" name="precio" class="form-control mb-2" placeholder="Precio" required>
                <input type="number" name="cantidad" class="form-control mb-2" placeholder="Cantidad" required>
                <button class="btn btn-primary w-100">Agregar</button>
            </form>
        </div>
    </div>
    <div class="col-md-8">
        <table class="table table-white shadow-sm">
            <thead class="table-dark">
                <tr><th>Producto</th><th>Precio</th><th>Cant.</th><th>Total</th></tr>
            </thead>
            <tbody>
                {% for item in carrito %}
                <tr>
                    <td>{{ item.producto }}</td>
                    <td>{{ item.precio }}</td>
                    <td>{{ item.cantidad }}</td>
                    <td>{{ item.total }}</td>
                </tr>
                {% endfor %}
            </tbody>
            <tfoot class="table-success">
                <tr><th colspan="3">Total General</th><th>{{ gran_total }}</th></tr>
            </tfoot>
        </table>
        <a href="/limpiar_carrito" class="btn btn-danger">Vaciar</a>
    </div>
</div>
{% endblock %}
